context:
  name: mpltoolbox
  version: 25.4.0
  python_min: "3.10"
package:
  name: ${{ name|lower }}
  version: ${{ version }}
source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mpltoolbox-${{ version }}.tar.gz
  sha256: 423276ae292b230e64d2de6532f1811a86014e2e6b044f47ca19fe6b8742af13
build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=68
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
tests:
  - script: python -c "import mpltoolbox"
    requirements:
      run:
        - python ${{ python_min }}.*
about:
  summary: Interactive tools for Matplotlib
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/scipp/mpltoolbox
  repository: https://github.com/scipp/mpltoolbox
extra:
  recipe-maintainers:
    - nvaytet